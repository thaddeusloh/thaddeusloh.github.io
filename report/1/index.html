<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Family Economy — Confidential Founder Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3F6F2; --card:#FFFFFF; --ink:#15251D; --pine:#1F6B4A;
  --coin:#B98A0E; --coin-soft:#F4E7C6; --muted:#5F6F66; --line:#DCE4DC;
  --danger:#9A3B2E; --ok:#1F6B4A;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Newsreader',Georgia,serif;font-size:18px;line-height:1.65;-webkit-font-smoothing:antialiased}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* ---------- GATE ---------- */
#gate{position:fixed;inset:0;background:
  radial-gradient(1100px 600px at 70% -10%, #E7EFE6 0%, var(--paper) 55%);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:24px}
.vault{width:min(430px,100%);background:var(--card);border:1px solid var(--line);
  border-radius:18px;padding:44px 40px 38px;box-shadow:0 24px 60px -30px rgba(21,37,29,.35);text-align:center}
.coin-slot{width:66px;height:66px;margin:0 auto 22px;border-radius:50%;
  background:conic-gradient(from 210deg,#D8B44A,#B98A0E 40%,#E9CE7E 70%,#B98A0E);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 0 5px rgba(255,255,255,.35), 0 10px 24px -10px rgba(185,138,14,.7)}
.coin-slot::after{content:"";width:26px;height:6px;border-radius:3px;background:#6d5106;opacity:.85}
.vault h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.45rem;letter-spacing:-.01em;margin-bottom:6px}
.vault p{color:var(--muted);font-size:.95rem;margin-bottom:26px}
.vault .mono{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--pine);display:block;margin-bottom:14px}
.field{display:flex;gap:10px}
.field input{flex:1;font-family:'IBM Plex Mono',monospace;font-size:.95rem;padding:13px 14px;
  border:1.5px solid var(--line);border-radius:10px;background:#FBFCFA;color:var(--ink);outline:none}
.field input:focus{border-color:var(--pine);box-shadow:0 0 0 3px rgba(31,107,74,.15)}
.field button{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:.95rem;
  padding:13px 20px;border:none;border-radius:10px;background:var(--pine);color:#fff;cursor:pointer}
.field button:hover{background:#175A3D}
.field button:focus-visible,.field input:focus-visible{outline:3px solid var(--coin);outline-offset:2px}
#gate-err{min-height:22px;margin-top:14px;color:var(--danger);font-family:'IBM Plex Mono',monospace;font-size:.78rem}
.shake{animation:shake .35s}
@keyframes shake{25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}
.vault .fine{margin-top:22px;font-size:.75rem;color:var(--muted)}

/* ---------- REPORT ---------- */
#report{display:none;max-width:1160px;margin:0 auto;padding:56px 28px 90px}
#report.open{display:grid;grid-template-columns:230px minmax(0,1fr);gap:56px}
@media(max-width:900px){#report.open{grid-template-columns:1fr;gap:0}}

.toc{position:sticky;top:32px;align-self:start;font-family:'IBM Plex Mono',monospace;font-size:.78rem}
.toc-title{letter-spacing:.16em;text-transform:uppercase;color:var(--coin);margin-bottom:14px;font-size:.7rem}
.toc a{display:block;color:var(--muted);text-decoration:none;padding:6px 0;border-left:2px solid var(--line);padding-left:12px;line-height:1.35}
.toc a:hover{color:var(--pine);border-left-color:var(--pine)}
@media(max-width:900px){.toc{position:static;display:none}}

main{grid-column:2}
@media(max-width:900px){main{grid-column:1}}
.doc-head{grid-column:1 / -1;margin-bottom:34px;border-bottom:1px solid var(--line);padding-bottom:34px}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--pine);margin-bottom:16px}
.doc-head h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(2.2rem,5vw,3.6rem);letter-spacing:-.02em;line-height:1.04;margin-bottom:16px}
.lede{font-size:1.15rem;color:var(--muted);max-width:60ch}
.verdict-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:28px}
.verdict-strip>div{background:var(--card);padding:14px 18px}
.verdict-strip .k{display:block;font-family:'IBM Plex Mono',monospace;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.verdict-strip .v{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:.98rem;color:var(--pine)}

section{margin-bottom:64px}
h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.7rem;letter-spacing:-.015em;margin-bottom:20px;display:flex;align-items:center;gap:14px;scroll-margin-top:24px}
.chip{flex:none;width:38px;height:38px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;font-size:.85rem;font-weight:500;color:#6d5106;
  background:conic-gradient(from 210deg,#E9CE7E,#D8B44A 45%,#F1E0A5 75%,#D8B44A);
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.5), 0 3px 8px -3px rgba(185,138,14,.6)}
h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:1.12rem;margin:28px 0 12px}
p{margin-bottom:14px;max-width:74ch}
ul,ol{margin:0 0 18px 22px;max-width:74ch}
li{margin-bottom:9px}
strong{font-weight:600}
code{font-family:'IBM Plex Mono',monospace;font-size:.82em;background:#E9EFE8;padding:1px 6px;border-radius:5px}
table{width:100%;border-collapse:collapse;margin:18px 0 24px;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:.92rem}
th{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;text-align:left;color:var(--muted);background:#EDF2EC;padding:11px 14px;border-bottom:1px solid var(--line)}
td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:none}
td.yes{color:var(--ok);font-weight:600}
td.no{color:var(--danger);font-weight:600}
td.maybe{color:var(--coin);font-weight:600}
.callout{border-radius:12px;padding:18px 22px;margin:22px 0;max-width:74ch;font-size:.96rem}
.callout.note{background:#EDE9DC;border:1px solid #DED6BE}
.callout.tip{background:#E4EFE7;border:1px solid #CBE0D1}
pre.arch{font-family:'IBM Plex Mono',monospace;font-size:.78rem;line-height:1.6;background:#14251D;color:#CFE3D6;padding:22px 26px;border-radius:12px;overflow-x:auto;margin:18px 0 24px}
.storyboard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px 26px;margin:22px 0}
.storyboard h3{margin-top:0}
.sb-meta{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted);margin-bottom:12px}
.sb td:first-child{font-family:'IBM Plex Mono',monospace}
.sources{font-size:.88rem;color:var(--muted)}
</style>
</head>
<body>

<div id="gate">
  <form class="vault" id="gate-form" autocomplete="off">
    <div class="coin-slot" aria-hidden="true"></div>
    <span class="mono">Confidential &middot; AES-256 encrypted</span>
    <h1>FamEcon Report</h1>
    <p>This document is encrypted. Enter the password to unlock it.</p>
    <div class="field">
      <input type="password" id="pw" placeholder="Password" aria-label="Password" required>
      <button type="submit">Unlock</button>
    </div>
    <p id="gate-err" role="alert"></p>
    <p class="fine">Without the correct password, the contents of this file are unreadable ciphertext.</p>
  </form>
</div>

<div id="report">
  <main id="content"></main>
</div>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function tryUnlock(pw){
  const keyMaterial = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(PAYLOAD.salt), iterations:PAYLOAD.iter, hash:"SHA-256"},
    keyMaterial, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(PAYLOAD.iv)}, key, b64(PAYLOAD.ct));
  return new TextDecoder().decode(pt);
}

document.getElementById("gate-form").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const err = document.getElementById("gate-err");
  const vault = e.currentTarget;
  err.textContent = "Verifying…";
  try{
    const html = await tryUnlock(document.getElementById("pw").value);
    document.getElementById("content").innerHTML = html;
    // move header + toc into the grid slots
    const rep = document.getElementById("report");
    const head = document.querySelector("#content .doc-head");
    const toc = document.querySelector("#content .toc");
    if(head) rep.prepend(head);
    if(toc) rep.insertBefore(toc, document.getElementById("content"));
    document.getElementById("gate").remove();
    rep.classList.add("open");
    document.title = "The Family Economy App — Founder Report";
  }catch(_){
    err.textContent = "Incorrect password. Try again.";
    vault.classList.remove("shake"); void vault.offsetWidth; vault.classList.add("shake");
  }
});
</script>
